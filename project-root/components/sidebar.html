<script>
    // Quick fix for correct paths depending on current location
    const isMain = window.location.pathname.endsWith('index.html') || window.location.pathname.endsWith('/');
    if (!isMain) {
        document.querySelectorAll('.sidebar-menu a').forEach(a => {
            let href = a.getAttribute('href');
            if (href === 'index.html') {
                a.setAttribute('href', '../index.html');
            } else if (href.startsWith('pages/')) {
                a.setAttribute('href', href.replace('pages/', ''));
            }
        });
    }
