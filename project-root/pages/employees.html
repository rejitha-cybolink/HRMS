<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            
            <main class="container-fluid p-4">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                    <div>
                        <h3 class="fw-bold text-dark mb-1">Employee Directory</h3>
                        <p class="text-muted mb-0">Manage all your company's workforce records.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary bg-white text-dark shadow-sm">
                            <i class="bi bi-download me-2"></i> Export
                        </button>
                        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
                            <i class="bi bi-person-plus me-2"></i> Add Employee
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-header bg-white border-bottom p-4">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control bg-light border-0 shadow-none" placeholder="Search employees...">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select bg-light border-0 shadow-none text-muted">
                                    <option>All Departments</option>
                                    <option>Engineering</option>
                                    <option>Design</option>
                                    <option>HR</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select bg-light border-0 shadow-none text-muted">
                                    <option>Status: All</option>
                                    <option>Active</option>
                                    <option>On Leave</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light text-muted small text-uppercase">
                                    <tr>
                                        <th class="ps-4 py-3 border-bottom-0">Employee</th>
                                        <th class="py-3 border-bottom-0">Department</th>
                                        <th class="py-3 border-bottom-0">Role</th>
                                        <th class="py-3 border-bottom-0">Status</th>
                                        <th class="pe-4 py-3 border-bottom-0 text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="employee-table">
                                    <!-- Handled by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
            
            <div id="footer-container"></div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-bottom-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold">Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addEmployeeForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">First Name</label>
                                <input type="text" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">Last Name</label>
                                <input type="text" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted small fw-bold">Email</label>
                                <input type="email" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">Department</label>
                                <select class="form-select bg-light border-0" required>
                                    <option value="">Select...</option>
                                    <option>Engineering</option>
                                    <option>Design</option>
                                    <option>HR</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">Role</label>
                                <input type="text" class="form-control bg-light border-0" required>
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4">Save Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
