<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaves - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            
            <main class="container-fluid p-4">
                <div class="mb-4">
                    <span class="text-primary fw-bold small text-uppercase mb-1 d-block">Time Off</span>
                    <h3 class="fw-bold text-dark mb-0">Leave Management</h3>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm rounded-4 h-100 p-4 hover-card bg-white">
                            <i class="bi bi-umbrella text-primary bg-primary bg-opacity-10 rounded-3 p-2 fs-4 mb-3 d-inline-block" style="width:fit-content;"></i>
                            <h6 class="text-muted fw-bold mb-1">Paid Leave</h6>
                            <h2 class="fw-bold text-dark mb-0">12 <small class="text-muted fs-6 fw-normal">Days</small></h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm rounded-4 h-100 p-4 hover-card bg-white">
                            <i class="bi bi-bandaid text-danger bg-danger bg-opacity-10 rounded-3 p-2 fs-4 mb-3 d-inline-block" style="width:fit-content;"></i>
                            <h6 class="text-muted fw-bold mb-1">Sick Leave</h6>
                            <h2 class="fw-bold text-dark mb-0">5 <small class="text-muted fs-6 fw-normal">Days</small></h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm rounded-4 h-100 p-4 hover-card bg-white">
                            <i class="bi bi-calendar-event text-success bg-success bg-opacity-10 rounded-3 p-2 fs-4 mb-3 d-inline-block" style="width:fit-content;"></i>
                            <h6 class="text-muted fw-bold mb-1">Comp Off</h6>
                            <h2 class="fw-bold text-dark mb-0">2 <small class="text-muted fs-6 fw-normal">Days</small></h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm rounded-4 h-100 p-4 hover-card bg-primary text-white position-relative overflow-hidden">
                            <div class="position-relative z-1">
                                <i class="bi bi-clock-history bg-white bg-opacity-25 rounded-3 p-2 fs-4 mb-3 d-inline-block" style="width:fit-content;"></i>
                                <h6 class="text-white-50 fw-bold mb-1">Used This Year</h6>
                                <h2 class="fw-bold mb-0">8 <small class="text-white-50 fs-6 fw-normal">Days</small></h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm rounded-4 position-sticky" style="top: 100px;">
                            <div class="card-body p-4 p-md-5">
                                <h5 class="fw-bold text-dark mb-4">Request Leave</h5>
                                <form id="leaveRequestForm">
                                    <div class="mb-4">
                                        <label class="form-label text-muted small fw-bold">Leave Type</label>
                                        <select class="form-select bg-light border-0 py-2 shadow-none" required>
                                            <option value="">Select type...</option>
                                            <option>Annual Paid Leave</option>
                                            <option>Sick Leave</option>
                                            <option>Casual Leave</option>
                                        </select>
                                    </div>
                                    <div class="row g-3 mb-4">
                                        <div class="col-6">
                                            <label class="form-label text-muted small fw-bold">From</label>
                                            <input type="date" class="form-control bg-light border-0 py-2 shadow-none" required>
                                        </div>
                                        <div class="col-6">
                                            <label class="form-label text-muted small fw-bold">To</label>
                                            <input type="date" class="form-control bg-light border-0 py-2 shadow-none" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label text-muted small fw-bold">Reason (Optional)</label>
                                        <textarea class="form-control bg-light border-0 py-2 shadow-none" rows="3" placeholder="Brief explanation..."></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm">Submit Request</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold text-dark mb-0">My Requests</h5>
                            <a href="#" class="text-primary text-decoration-none fw-bold small">View All <i class="bi bi-arrow-right ms-1"></i></a>
                        </div>
                        
                        <div class="card border-0 shadow-sm rounded-4 mb-3 hover-card">
                            <div class="card-body p-4 d-flex align-items-center justify-content-between flex-wrap gap-3">
                                <div class="d-flex align-items-center gap-4">
                                    <div class="bg-light rounded-circle p-3 text-muted d-flex">
                                        <i class="bi bi-hourglass-split fs-4"></i>
                                    </div>
                                    <div>
                                        <h6 class="fw-bold text-dark fs-5 mb-1">Annual Paid Leave</h6>
                                        <span class="text-muted">Oct 24 - Oct 26 <span class="mx-2">•</span> 3 Days</span>
                                    </div>
                                </div>
                                <span class="badge bg-warning-subtle text-warning rounded-pill px-4 py-2 fw-bold">Pending</span>
                            </div>
                        </div>

                        <div class="card border-0 shadow-sm rounded-4 mb-3 hover-card">
                            <div class="card-body p-4 d-flex align-items-center justify-content-between flex-wrap gap-3">
                                <div class="d-flex align-items-center gap-4">
                                    <div class="bg-success-subtle rounded-circle p-3 text-success d-flex">
                                        <i class="bi bi-check-circle-fill fs-4"></i>
                                    </div>
                                    <div>
                                        <h6 class="fw-bold text-dark fs-5 mb-1">Sick Leave</h6>
                                        <span class="text-muted">Sep 12 - Sep 13 <span class="mx-2">•</span> 2 Days</span>
                                    </div>
                                </div>
                                <span class="badge bg-success-subtle text-success rounded-pill px-4 py-2 fw-bold">Approved</span>
                            </div>
                        </div>
                        
                        <div class="card border-0 shadow-sm rounded-4 hover-card">
                            <div class="card-body p-4 d-flex align-items-center justify-content-between flex-wrap gap-3">
                                <div class="d-flex align-items-center gap-4">
                                    <div class="bg-danger-subtle rounded-circle p-3 text-danger d-flex">
                                        <i class="bi bi-x-circle-fill fs-4"></i>
                                    </div>
                                    <div>
                                        <h6 class="fw-bold text-dark fs-5 mb-1">Casual Leave</h6>
                                        <span class="text-muted">Aug 05 <span class="mx-2">•</span> 1 Day</span>
                                    </div>
                                </div>
                                <span class="badge bg-danger-subtle text-danger rounded-pill px-4 py-2 fw-bold">Rejected</span>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
            
            <div id="footer-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
