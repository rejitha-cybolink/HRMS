<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            
            <main class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 class="fw-bold text-dark mb-1">Welcome back, Admin!</h3>
                        <p class="text-muted mb-0">Here's what's happening today.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
                            <i class="bi bi-person-plus me-2"></i> Add Employee
                        </button>
                        <a href="pages/leaves.html" class="btn btn-outline-primary shadow-sm">
                            <i class="bi bi-calendar-plus me-2"></i> Apply Leave
                        </a>
                    </div>
                </div>

                <div class="row g-4 mb-4" id="summary-cards">
                    <!-- Cards will be populated by main.js -->
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-header bg-white border-0 pt-4 pb-2 px-4">
                                <h5 class="fw-bold mb-0">Recent Activity</h5>
                            </div>
                            <div class="card-body px-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="text-muted small text-uppercase">
                                            <tr>
                                                <th class="ps-4">Employee</th>
                                                <th>Action</th>
                                                <th>Time</th>
                                                <th class="pe-4">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody id="recent-activity-table">
                                            <!-- Populated by JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm rounded-4 bg-primary text-white h-100 p-4 attendance-widget position-relative overflow-hidden">
                            <i class="bi bi-stopwatch position-absolute opacity-10" style="font-size: 150px; right: -20px; bottom: -20px;"></i>
                            <div class="position-relative z-1">
                                <h5 class="fw-bold mb-3">Attendance Widget</h5>
                                <h2 class="display-4 fw-bold mb-1" id="current-time">--:--</h2>
                                <p class="text-white-50 mb-4 pb-3 border-bottom border-light border-opacity-25" id="clock-status">Not Punched In</p>
                                
                                <div class="d-flex justify-content-between mb-4">
                                    <div>
                                        <small class="text-white-50 d-block text-uppercase fw-bold">Work Hours</small>
                                        <span class="fs-5 fw-bold" id="total-hours">00:00 h</span>
                                    </div>
                                    <div class="text-end">
                                        <small class="text-white-50 d-block text-uppercase fw-bold">Break</small>
                                        <span class="fs-5 fw-bold">00:00 h</span>
                                    </div>
                                </div>

                                <button id="clock-btn" class="btn btn-light w-100 fw-bold py-3 rounded-3 shadow-sm d-flex align-items-center justify-content-center transition-all">
                                    <i class="bi bi-box-arrow-in-right me-2 fs-5" id="clock-btn-icon"></i> <span id="clock-btn-text">Clock In</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            
            <div id="footer-container"></div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-bottom-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold">Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addEmployeeForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">First Name</label>
                                <input type="text" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">Last Name</label>
                                <input type="text" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted small fw-bold">Email</label>
                                <input type="email" class="form-control bg-light border-0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">Department</label>
                                <select class="form-select bg-light border-0" required>
                                    <option value="">Select...</option>
                                    <option>Engineering</option>
                                    <option>Design</option>
                                    <option>HR</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">Role</label>
                                <input type="text" class="form-control bg-light border-0" required>
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4">Save Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
