<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-dark mb-0">Employee Directory</h3>
                    <button class="btn btn-primary shadow-sm"><i class="bi bi-person-plus me-2"></i> Add Employee</button>
                </div>
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small text-uppercase"><tr><th class="ps-4 py-3">Employee</th><th>Department</th><th>Role</th><th class="pe-4 text-end">Action</th></tr></thead>
                            <tbody>
                                <tr><td class="ps-4"><div class="fw-bold">Elena Rodriguez</div><small class="text-muted">elena@company.com</small></td><td>Design</td><td>Senior Designer</td><td class="pe-4 text-end"><a href="employee_profile.html" class="btn btn-sm btn-light text-primary"><i class="bi bi-eye"></i> View</a></td></tr>
                                <tr><td class="ps-4"><div class="fw-bold">Marcus Thorne</div><small class="text-muted">marcus@company.com</small></td><td>Engineering</td><td>Lead Dev</td><td class="pe-4 text-end"><a href="employee_profile.html" class="btn btn-sm btn-light text-primary"><i class="bi bi-eye"></i> View</a></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
