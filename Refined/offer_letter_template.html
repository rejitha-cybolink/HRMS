<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Letter Template - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="mb-4"><h3 class="fw-bold text-dark mb-1">Create Offer Letter</h3></div>
                <div class="card border-0 shadow-sm rounded-4 p-4"><form><div class="row g-3"><div class="col-md-6"><label class="form-label small fw-bold text-muted">Candidate Name</label><input type="text" class="form-control bg-light border-0"></div><div class="col-md-6"><label class="form-label small fw-bold text-muted">Role</label><input type="text" class="form-control bg-light border-0"></div><div class="col-12"><label class="form-label small fw-bold text-muted">Salary Details</label><input type="text" class="form-control bg-light border-0"></div><div class="col-12 mt-4"><button type="submit" class="btn btn-primary fw-bold px-4">Generate Letter</button></div></div></form></div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
