<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-dark mb-0">Monthly Reports</h3>
                    <button class="btn btn-primary shadow-sm"><i class="bi bi-download me-2"></i> Download PDF</button>
                </div>
                <div class="row g-4 mb-4">
                    <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4 p-4 hover-card"><h6 class="text-muted fw-bold text-uppercase">Working Days</h6><h2 class="fw-bold mt-2 mb-0">22</h2></div></div>
                    <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4 p-4 hover-card"><h6 class="text-muted fw-bold text-uppercase">Avg. Attendance</h6><h2 class="fw-bold mt-2 mb-0">94%</h2></div></div>
                </div>
                <div class="card border-0 shadow-sm rounded-4 p-4"><h5 class="fw-bold mb-4">Department Analytics</h5>
                    <div class="mb-3"><div class="d-flex justify-content-between mb-1"><span class="fw-bold">Engineering</span><span class="text-primary fw-bold">96%</span></div><div class="progress" style="height: 8px;"><div class="progress-bar bg-primary" style="width: 96%"></div></div></div>
                    <div class="mb-3"><div class="d-flex justify-content-between mb-1"><span class="fw-bold">Sales</span><span class="text-primary fw-bold">89%</span></div><div class="progress" style="height: 8px;"><div class="progress-bar bg-primary opacity-75" style="width: 89%"></div></div></div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
