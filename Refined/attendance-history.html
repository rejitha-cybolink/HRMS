<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance History - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="mb-4"><h3 class="fw-bold text-dark mb-1">Attendance History</h3></div>
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small text-uppercase"><tr><th class="ps-4 py-3">Date</th><th>Punch In</th><th>Punch Out</th><th>Total Hours</th><th class="pe-4 text-end">Status</th></tr></thead>
                            <tbody>
                                <tr><td class="ps-4 fw-bold">Oct 24, 2023</td><td>09:00 AM</td><td>06:00 PM</td><td>09:00h</td><td class="pe-4 text-end"><span class="badge bg-success-subtle text-success px-3">Present</span></td></tr>
                                <tr><td class="ps-4 fw-bold">Oct 23, 2023</td><td>09:15 AM</td><td>06:00 PM</td><td>08:45h</td><td class="pe-4 text-end"><span class="badge bg-warning-subtle text-warning px-3">Late</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
