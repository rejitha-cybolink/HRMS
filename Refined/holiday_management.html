<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Management - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-dark mb-0">Company Holidays</h3>
                    <button class="btn btn-primary shadow-sm"><i class="bi bi-plus-lg me-2"></i> Add Holiday</button>
                </div>
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small text-uppercase"><tr><th class="ps-4 py-3">Date</th><th>Holiday Name</th><th>Day</th><th class="pe-4 text-end">Type</th></tr></thead>
                            <tbody>
                                <tr><td class="ps-4 fw-bold">Jan 01, 2024</td><td>New Year's Day</td><td class="text-muted">Monday</td><td class="pe-4 text-end"><span class="badge bg-primary-subtle text-primary px-3">Public</span></td></tr>
                                <tr><td class="ps-4 fw-bold">Dec 25, 2024</td><td>Christmas Day</td><td class="text-muted">Wednesday</td><td class="pe-4 text-end"><span class="badge bg-primary-subtle text-primary px-3">Public</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
