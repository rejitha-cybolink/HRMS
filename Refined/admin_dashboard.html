<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div><h3 class="fw-bold text-dark mb-1">Admin Dashboard</h3><p class="text-muted mb-0">Overview of company metrics.</p></div>
                    <button class="btn btn-primary shadow-sm"><i class="bi bi-download me-2"></i> Export Report</button>
                </div>
                <div class="row g-4 mb-4">
                    <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4 p-4 hover-card"><p class="text-muted small fw-bold text-uppercase mb-1">Total Employees</p><h3 class="fw-bold mb-0">1,248</h3></div></div>
                    <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4 p-4 hover-card"><p class="text-muted small fw-bold text-uppercase mb-1">Present Today</p><h3 class="fw-bold text-success mb-0">1,180</h3></div></div>
                    <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4 p-4 hover-card"><p class="text-muted small fw-bold text-uppercase mb-1">Absent Today</p><h3 class="fw-bold text-danger mb-0">22</h3></div></div>
                    <div class="col-md-3"><div class="card border-0 shadow-sm rounded-4 p-4 hover-card"><p class="text-muted small fw-bold text-uppercase mb-1">On Leave</p><h3 class="fw-bold text-warning mb-0">46</h3></div></div>
                </div>
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 p-4"><h5 class="fw-bold mb-0">Recent Activity</h5></div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light text-muted small text-uppercase"><tr><th class="ps-4 py-3">Employee</th><th>Action</th><th>Time</th><th class="pe-4">Status</th></tr></thead>
                                <tbody>
                                    <tr><td class="ps-4 fw-bold">John Doe</td><td>Clocked In</td><td>08:55 AM</td><td class="pe-4"><span class="badge bg-success-subtle text-success">On Time</span></td></tr>
                                    <tr><td class="ps-4 fw-bold">Anna Smith</td><td>Leave Request</td><td>Yesterday</td><td class="pe-4"><span class="badge bg-warning-subtle text-warning">Pending</span></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
