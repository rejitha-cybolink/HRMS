<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center"><div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-5 text-center">
                <h3 class="fw-bold mb-4 text-primary">HRMS Portal</h3>
                <form action="admin_dashboard.html">
                    <div class="mb-3 text-start"><label class="form-label small fw-bold text-muted">Email</label><input type="email" class="form-control bg-light border-0 py-2" required></div>
                    <div class="mb-4 text-start"><label class="form-label small fw-bold text-muted">Password</label><input type="password" class="form-control bg-light border-0 py-2" required></div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
                </form>
            </div>
        </div></div>
    </div>
</body>
</html>
