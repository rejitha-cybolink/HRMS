<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Attendance - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex wrapper">
        <div id="sidebar-container"></div>
        <div class="content-wrapper flex-grow-1 bg-light">
            <div id="header-container"></div>
            <main class="container-fluid p-4">
                <div class="mb-4"><h3 class="fw-bold text-dark mb-1">Daily Attendance Log</h3></div>
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 p-4 h-100 bg-white text-center">
                            <h2 class="display-3 fw-bold text-primary mb-2" id="clock-time">00:00</h2>
                            <p class="text-muted mb-4" id="clock-status">Not Punched In</p>
                            <button id="clock-btn" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm"><i class="bi bi-box-arrow-in-right me-2"></i> Clock In</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                            <h5 class="fw-bold mb-4">Today's Team Status</h5>
                            <div class="d-flex justify-content-between mb-2"><span class="text-muted">Present</span><span class="fw-bold">45/50</span></div>
                            <div class="progress mb-3" style="height: 8px;"><div class="progress-bar bg-success" style="width: 90%"></div></div>
                            <div class="d-flex justify-content-between mb-2"><span class="text-muted">On Leave</span><span class="fw-bold text-warning">3</span></div>
                            <div class="d-flex justify-content-between"><span class="text-muted">Absent</span><span class="fw-bold text-danger">2</span></div>
                        </div>
                    </div>
                </div>
            </main>
            <div id="footer-container"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
